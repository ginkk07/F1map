<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1導航地圖</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  a {margin: 0;text-decoration:none;color: #fff;}
  
  body {
    margin: 0; 
    background-color: #0d0d17; 
    font-family: 'Rajdhani', sans-serif; 
    overflow: hidden;
    background-image: url(/img/bg01.png);
    background-position: top left;
    background-size: cover;
  }

  .top-nav { display: flex; justify-content: center; gap: 40px; padding: 20px 0; font-size: 1.2rem; font-weight: 600; letter-spacing: 2px; z-index: 10; position: relative; }
  .nav-item { color: #445363; cursor: pointer; transition: 0.3s; }
  .nav-item:hover, .nav-item.active { color: #00d2ff; text-shadow: 0 0 8px #00d2ff; }

  .telemetry { position: absolute; font-size: 0.75rem; color: #4a6b8c; line-height: 1.5; z-index: 5; pointer-events: none; }
  .telemetry span { color: #00d2ff; }
  .top-left { top: 20px; left: 20px; }
  .top-right { top: 20px; right: 20px; text-align: right; }

  /* ==========================================
     3D 空間與圖層設定
  ========================================== */
  .map-container {
    width: 100vw; height: calc(100vh - 65px);
    display: flex; justify-content: center; align-items: center;
    position: relative;
    perspective: 1200px; /* 攝影機透視深度 */
  }

  .map-wrapper {
    position: relative; 
    width: 90%; max-width: 1280px; aspect-ratio: 16 / 9;
    transform-style: preserve-3d;
    transition: transform 1s cubic-bezier(0.25, 1, 0.5, 1);
  }

  /* 粒子層： Z = 5px，創造「螢幕內部」的微距景深，偏移量極小 */
  #particleCanvas {
    width: 100%; height: 100%; display: block;
    position: absolute; top: 0; left: 0;
    transform: translateZ(-5px);
    pointer-events:none;
  }

  #logo-ani{
    display: flex;
    position: absolute;
    bottom: 30px;
    left: 20px;
    width: 250px;
    height: 25px;
    z-index: 20;
    cursor: pointer;
    transition: 0.3s;
  }

  #logo-ani-poly{
    position: relative;
    height: 25px;
    width: 25px;
    flex-grow: 0;
    z-index: 10;

    & span:nth-child(1){
      display: block;
      position: absolute;
      width: 11px;
      height: 11px;
      left: 0;
      top: 0;
      background-color: #fff;
      transition: 0.66s cubic-bezier(0.07, 0.48, 0.52, 1.0);
    }

    & span:nth-child(2){
      display: block;
      position: absolute;
      width: 11px;
      height: 11px;
      right: 0;
      top: 0;
      background-color: #fff;
      transition: 0.66s cubic-bezier(0.07, 0.48, 0.52, 1.0);
    }

    & span:nth-child(3){
      display: block;
      position: absolute;
      width: 11px;
      height: 11px;
      right: 0;
      bottom: 0;
      background-color: #fff;
      transition: 0.66s cubic-bezier(0.07, 0.48, 0.52, 1.0);
    }

    & span:nth-child(4){
      display: block;
      position: absolute;
      width: 11px;
      height: 11px;
      left: 0;
      bottom: 0;
      background-color: #fff;
      transition: 0.66s cubic-bezier(0.07, 0.48, 0.52, 1.0);
    }

  }

  #logo-ani-name{
    height: 100%;
    position: relative;
    line-height: 1rem;
    color: #fff;
    flex-grow: 1;
    overflow: clip;
    margin-left: 0.5rem;
    z-index: 20;

    & h3:nth-child(1){
      position: absolute;
      top: 50%;
      transform: translateY(-45%);
      margin: 0;
      transition: 0.66s cubic-bezier(0.07, 0.48, 0.52, 1.04);
      font-size: 2rem;
    }
    & h3:nth-child(2){
      position: absolute;
      top: 150%;
      left: 5%;
      transform: translateY(-40%);
      margin: 0;
      transition: 0.66s cubic-bezier(0.07, 0.48, 0.52, 1.04);
      font-size: 1.5rem;
      font-weight: 700;
      opacity: 0;
    }
  }

  /*LOGO動畫*/
  #logo-ani:hover  {

    & #logo-ani-name h3:nth-child(1) { top: -150%; }
    & #logo-ani-name h3:nth-child(2) { top: 50%; opacity: 1;}

    & #logo-ani-poly span{
      /*border-radius: 2rem;*/
      
    }

    & #logo-ani-poly span:nth-child(1){
      top: 0;
      left: 100%;
      width: 200px;
      height: 120%;
      background-color: #5c5c5c;
    }

    & #logo-ani-poly span:nth-child(2){
      top: -20%;
      right: 5px;
      height: 10px;
      width: 10px;
      background-color: #ffe508;
    }

    & #logo-ani-poly span:nth-child(3){
      bottom: -5px;
      right: -5px;
      height: 10px;
      width: 10px;
      background-color: #ffe508;
    }

    & #logo-ani-poly span:nth-child(4){
      bottom: 0;
      left: 100%;
      width: 200px;
      height: 120%;
      background-color: #5c5c5c;
    }
  }

  

  /* MAP線條層 */
  #baseMapCanvas {
    width: 100%; height: 100%; display: block;
    position: absolute; top: 0; left: 0;
    transform: translateZ(0);
    opacity: 1; /* 稍微透明一點，增加層次感 */
    pointer-events:none;
  }

  /* MAP標記點：Z=0 */
  .race-pin {
    position: absolute; 
    width: 11px; 
    height: 11px;
    background-color: #ffd518; 
    border-radius: 50%;
    transform: translate(-50%, -50%) translateZ(6px)  rotateX(0deg); /* Z 軸歸零 */
    cursor: pointer; 
    box-shadow: 0 0 3px #000000;
    z-index: 20; 
    transition: all 0.3s;
    transform-style: preserve-3d;
  }

  .race-pin::after {
    content: ''; 
    position: absolute;
    top: 50%; left: 50%; 
    transform: translate(-50%, -50%);
    width: 13px; 
    height: 13px; 
    border: 1px solid #ffd518; 
    box-sizing: border-box;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  /*MAP游標懸浮標籤*/
  .pin-label {
    position: absolute; bottom: 20px; left: 50%; 
    transform: translate(-50%, 0px) rotateX(0deg);
    transform-origin: bottom center; 
    
    background: rgba(12, 18, 28, 0.95);
    /* 底層微弱的靜態邊框 */
    box-shadow: inset 0 0 0 1px rgb(178 253 255 / 30%);
    color: #fff; font-size: 0.85rem; font-weight: 700; letter-spacing: 1px;
    padding: 6px 18px; white-space: nowrap;
    opacity: 0; 
    pointer-events: none; 
    z-index: 1;

    transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
  }

  .pin-label::before,.pin-label::after {
    content: ''; 
    position: absolute;
    /* inset: 讓動態線條稍微擴張，包在原本的按鈕外圍 */
    inset: 0px;
    z-index: -1;
    
    /* 設定動態線條的顏色與粗細 (2px) */
    box-shadow: inset 0 0 0 1px #00ffff;
    animation: clipBorder 4s linear infinite;
  }

  /* 讓第二條線延遲一半的動畫時間，形成對角對稱追逐 */
  .pin-label::before {
    animation-delay: -2s;
  }



  @keyframes clipBorder {
    0%, 100% { clip-path: inset(0 0 calc(100% - 2px) 0); } /* 上邊線 */
    25%      { clip-path: inset(0 calc(100% - 2px) 0 0); } /* 左邊線 */
    50%      { clip-path: inset(calc(100% - 2px) 0 0 0); } /* 下邊線 */
    75%      { clip-path: inset(0 0 0 calc(100% - 2px)); } /* 右邊線 */
  }
  
  .race-pin:hover .pin-label {
    opacity: 1; 
    bottom: 28px; 
    text-shadow: 0 0 5px #00ffff;
  }

  .race-pin.active .pin-label {
    opacity: 1; 
    bottom: 28px; 
    background: rgba(0, 0, 0, 0.90);
  }

  @keyframes pulse {
    0% { width: 13px; height: 13px; opacity: 1; }
    100% { width: 49px; height: 49px; opacity: 0; }
  }

  .race-pin.active .tooltip { opacity: 1; bottom: 35px; pointer-events: auto; }
  .race-pin.dimmed { opacity: 0.3; }

  /* ==========================================
     粒子煙霧畫布
    ========================================== */
  #fogCanvas {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; 
    height: 40vh; /* 佔據螢幕底部 40% 的空間 */
    pointer-events: none; /* 絕對不能擋住滑鼠點擊 */
    z-index: -5;
    
    /* 魔法遮罩：讓畫布頂部的邊緣自然淡出，完美融入星空背景 */
    -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 20%, rgba(0,0,0,0) 100%);
    mask-image: linear-gradient(to top, rgba(0,0,0,1) 20%, rgba(0,0,0,0) 100%);
  }

  /* ==========================================
     面板反轉修正
  ========================================== */
  .tooltip {
    position: absolute; bottom: 25px; left: 50%; 
    /* 保持面板立起迎向鏡頭 */
    transform: translateX(-50%) rotateX(-45deg);
    transform-origin: bottom center;
    width: 280px; background: rgba(12, 18, 28, 0.95);
    border: 1px solid #00d2ff; border-radius: 6px; overflow: hidden;
    opacity: 0; pointer-events: none; transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    box-shadow: 0 15px 35px rgba(0,0,0,0.8); z-index: 30;
  }

  /* ==========================================
     右側滑入資訊面板 (Side Panel)
  ========================================== */
  .side-panel {
    display: flex; 
    flex-direction: column;
    position: fixed; 
    top: 0; 
    right: -450px; /* 預設藏在畫面右側外面 */
    width: 400px; 
    height: 100vh;
    z-index: 99; 
    transition: right 0.6s cubic-bezier(0.25, 1, 0.5, 1);
  }

  .side-panel::after{
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(5px);
    background-color: rgb(0 0 0 / 75%);
  }

  /* 當面板被加上 active class 時，滑入畫面 */
  .side-panel.active { right: 0; }

  .side-panel-outbox{
    position: absolute;
    z-index: 99;
    min-height: 100vh;
  }

  .panel-close {
    position: absolute;
    top: 0%;
    right: 100%;
    padding: 10px 12px;
    color: #ffffff88;
    font-size: 1.5rem;
    cursor: pointer;
    z-index: 10;
    transition: 0.3s;
    background-color: #5b5b5b;
    border-radius: 2px 0 0 2px;
  }
  .panel-close:hover { color: #ffffff; background-color: #009bca;}

  .panel-img { width: 100%; height: 245px; background-size: cover; background-position: center; }
  .panel-content { padding: 40px 30px; }
  .panel-title { font-size: 2.2rem; font-weight: 700; color: #fff; margin: 0 0 5px 0; text-shadow: 0 0 8px #00d2ff; }
  .panel-date { font-size: 1.1rem; color: #00ffff; font-weight: 600; margin-bottom: 25px; letter-spacing: 1px; }
  .panel-desc { font-size: 1.05rem; color: #a0b0c0; line-height: 1.6; margin-bottom: 30px; letter-spacing: 0.2px;}
  
  .panel-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    width: 100%; 
    padding: 15px;  
    border: 1px solid #4d4d4d80;
    color: #697887cf; 
    font-family: 'Rajdhani', sans-serif; 
    font-size: 1.3rem; 
    font-weight: 600;
    cursor: pointer; 
    transition: 0.3s; 
    letter-spacing: 1px;
    border-radius: 3px;
    background-color: transparent;
  }

  .panel-btn:hover {     
    background-color: rgb(93 130 149 / 20%);
    color: #fff;
    letter-spacing: 5px;
  }

  .panel-btn:after {
    content: "";
    position: absolute;
    left: .75rem;
    width: 1rem;
    height: 55%;
    background-color: #00ffff;
    -webkit-clip-path: polygon(0 0, 25% 0, 25% 100%, 0 100%);
    clip-path: polygon(0 0, 25% 0, 25% 100%, 0 100%);
    transition: transform .2s ease, -webkit-clip-path .2s ease;
    transition: clip-path .2s ease, transform .2s ease;
    transition: clip-path .2s ease, transform .2s ease, -webkit-clip-path .2s ease;
  }

  .panel-btn:hover:after {  
    -webkit-clip-path: polygon(0 20%, 100% 50%, 0 80%, 0 80%);
    clip-path: polygon(0 20%, 100% 50%, 0 80%, 0 80%);
    transform: translateX(.575rem);
  }


  .tooltip-img { width: 100%; height: 120px; background-size: cover; background-position: center; border-bottom: 1px solid #1f2d40; }
  .tooltip-content { padding: 15px; text-align: left; }
  .tooltip-title { font-size: 1.4rem; font-weight: 700; color: #fff; margin: 0 0 5px 0; text-shadow: 0 0 5px #00d2ff;}
  .tooltip-date { font-size: 0.95rem; color: #00ffff; font-weight: 600; margin-bottom: 10px; }
  .tooltip-desc { font-size: 0.9rem; color: #a0b0c0; line-height: 1.5; margin: 0; }

</style>
</head>
<body>

  <nav class="top-nav">
    <div class="nav-item active">HOME</div>
    <div class="nav-item">DESTINATIONS</div>
  </nav>

  <div class="telemetry top-left">TELEMETRY: <span>15.3</span><br>HIGH: <span>93.98</span></div>
  <div class="telemetry top-right">SYS_STAT: <span>ONLINE</span><br>LATENCY: <span>12ms</span></div>


  <div class="map-container">
    <div id="logo-ani" onclick="window.location.href='https://www.tristar.com.tw/'">
      <div id="logo-ani-poly">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div id="logo-ani-name">
        <h3>TRISTAR TOUR</h3>
        <h3>福泰旅遊</h3>
      </div>
    </div>
    <div class="map-wrapper" id="mapWrapper">
      <canvas id="particleCanvas"></canvas>
      <canvas id="baseMapCanvas"></canvas>

      <!--地點:上海-->

           data-title="上海大獎賽"

           data-img="https://image.tristar.com.tw/Picture/NewTristar/102038/015/1575885293_17bfce7886_h.jpeg">

      </div>
      <!--地點:日本-->
      <div class="race-pin" style="top: 44%; left: 84.5%;"
           data-title="日本大獎賽"
           data-date="MARCH 27 - 29"
           data-desc="結合名古屋周邊體驗之 F1 旅遊行程，感受鈴鹿賽道的極速震撼。"
           data-img="https://image.tristar.com.tw/Picture/NewTristar/102038/015/1575885293_17bfce7886_h.jpeg">

      </div>
      <!--地點:新加坡-->
      <div class="race-pin" style="top: 63.5%;left: 75.1%;"

           data-img="https://image.tristar.com.tw/Picture/NewTristar/91825/733/1741336084_a766761809_h.jpeg">

      <!--地點:匈牙利-->
      <div class="race-pin" style="top: 35%;left: 52.5%;"
           data-title="匈牙利大獎賽"
           data-date="JULY 24 - 26"
           data-desc="此賽道以緊湊多彎的設計聞名，彎道數量多且連貫，對車手操控技術要求極高。由於缺乏長直道及超車點，加上高溫和塵土飛揚的環境，被稱為「F1中的卡丁車賽道」。"
           data-img="https://image.tristar.com.tw/Picture/NewTristar/101183/386/1726105399_8fce4ddfcb_h.jpeg">
        <div class="pin-label">HUNGARY</div>
      </div>

      <!--地點:摩納哥-->
      <div class="race-pin" style="top: 38.5%;left: 48.5%;"
           data-title="摩納哥大獎賽"
           data-date="JUNE 05 - 07"
           data-desc="摩納哥大獎賽是一級方程式賽車每年在蒙特卡洛的摩納哥賽道舉行的比賽。從1929年開跑以來被大眾認為是最重要及最負盛名的汽車賽事，優美的風景和刺激的賽事讓摩納哥大獎賽有「一級方程式皇冠之上的明珠」的稱號。"
           data-img="https://image.tristar.com.tw/Picture/NewTristar/101183/540/1726108674_f86129b5cc_h.webp">
        <div class="pin-label">MONACO</div>
      </div>
    </div>
    <canvas id="fogCanvas"></canvas>
  </div>
  

  <div class="side-panel" id="sidePanel">
    <div class="side-panel-outbox">
      <div class="panel-close" id="panelClose">✖</div>
      <div class="panel-img" id="panelImg"></div>
      <div class="panel-content">
        <h2 class="panel-title" id="panelTitle">TITLE</h2>
        <div class="panel-date" id="panelDate">DATE</div>
        <p class="panel-desc" id="panelDesc">DESC</p>
        <button class="panel-btn">VIEW DETAILS</button>
      </div>
    </div>
  </div>

  

  <script>
    const ZOOM_LEVEL = 5;
    
    // 取得兩張獨立畫布
    const baseCanvas = document.getElementById('baseMapCanvas');
    const partCanvas = document.getElementById('particleCanvas');
    const bCtx = baseCanvas.getContext('2d');
    const pCtx = partCanvas.getContext('2d');

    const width = 1920 * ZOOM_LEVEL;
    const height = 1080 * ZOOM_LEVEL;
    
    baseCanvas.width = width; baseCanvas.height = height;
    partCanvas.width = width; partCanvas.height = height;

    const originalMap = new Image(); 
    const maskMap = new Image();     

    originalMap.src = 'worldmap.svg'; 

    fetch('worldmap.svg')
      .then(res => res.text())
      .then(svgData => {
        const styleTag = '<style> path { fill: #ffffff !important; stroke: none !important; } </style>';
        const modifiedSvg = svgData.replace(/<svg[^>]*>/, match => match + styleTag);
        const svgBlob = new Blob([modifiedSvg], {type: 'image/svg+xml;charset=utf-8'});
        maskMap.src = URL.createObjectURL(svgBlob);
      });

    let loadedImages = 0;
    function checkLoad() {
      loadedImages++;
      if (loadedImages === 2) draw3DHolographicMap();
    }
    originalMap.onload = checkLoad;
    maskMap.onload = checkLoad;

    function draw3DHolographicMap() {

      // 繪製基底線條 (Base Map)
      bCtx.shadowColor = '#00ffff';
      bCtx.shadowBlur = 5 * ZOOM_LEVEL; 
      bCtx.drawImage(originalMap, 0, 0, width, height);

      bCtx.shadowColor = 'rgba(0, 210, 255, 0.8)';
      bCtx.shadowBlur = 15 * ZOOM_LEVEL;
      bCtx.drawImage(originalMap, 0, 0, width, height);
      bCtx.shadowBlur = 0;

      // 繪製粒子效果 (Particle Map)
      // A. 漸層邊緣遮罩
      const edgeMaskCanvas = document.createElement('canvas');
      edgeMaskCanvas.width = width; edgeMaskCanvas.height = height;
      const edgeCtx = edgeMaskCanvas.getContext('2d');

      // 畫上 100% 實心白色的地圖
      edgeCtx.drawImage(maskMap, 0, 0, width, height);

      // 加上模糊邊緣
      edgeCtx.globalCompositeOperation = 'destination-out';
      edgeCtx.filter = `blur(${20 * ZOOM_LEVEL}px)`; 
      edgeCtx.globalAlpha = 0.88; // 限制的最低減去%

      edgeCtx.drawImage(maskMap, 0, 0, width, height); // 擦除中心。所以內陸最深處保留最低的透明度

      // 粒子網格
      const patternCanvas = document.createElement('canvas');
      const dotSpacing = 8 * (ZOOM_LEVEL / 2); // 點密度調整
      patternCanvas.width = dotSpacing; patternCanvas.height = dotSpacing;
      const patCtx = patternCanvas.getContext('2d');

      patCtx.fillStyle = 'rgba(0, 210, 255, 0.6)'; 
      patCtx.beginPath();
      patCtx.arc(dotSpacing / 2, dotSpacing / 2, 3 * (ZOOM_LEVEL / 3), 0, Math.PI * 2); // 點大小
      patCtx.fill();

      // 將粒子與遮罩混合，畫在獨立的粒子畫布上
      pCtx.fillStyle = pCtx.createPattern(patternCanvas, 'repeat');
      pCtx.fillRect(0, 0, width, height);
      
      pCtx.globalCompositeOperation = 'destination-in';
      pCtx.drawImage(edgeMaskCanvas, 0, 0, width, height);
    }

    // 3D 運鏡與置中邏輯
    const mapWrapper = document.getElementById('mapWrapper');
    const mapContainer = document.querySelector('.map-container');
    const pins = document.querySelectorAll('.race-pin');

    // 抓取側邊面板的各個元素
    const sidePanel = document.getElementById('sidePanel');
    const panelTitle = document.getElementById('panelTitle');
    const panelDate = document.getElementById('panelDate');
    const panelDesc = document.getElementById('panelDesc');
    const panelImg = document.getElementById('panelImg');
    const panelClose = document.getElementById('panelClose');

    pins.forEach(pin => {
      pin.addEventListener('click', function(e) {
        e.stopPropagation(); 

        // 光點狀態切換 (PC 與手機版共通)
        pins.forEach(p => { p.classList.remove('active'); p.classList.add('dimmed'); });
        this.classList.add('active'); this.classList.remove('dimmed');

        // ==========================================
        // 判斷是否為 PC 版 (設定大於 768px 才會 Zoom-in)
        // ==========================================
        if (window.innerWidth > 768) {
            const topVal = parseFloat(this.style.top);
            const leftVal = parseFloat(this.style.left);
            const moveX = 50 - leftVal; 
            const moveY = 50 - topVal + 15; 

            // 計算偏移量側邊欄寬200px。
            const offsetPx = 200;

            mapWrapper.style.transformOrigin = `${leftVal}% ${topVal}%`;
            
            // 使用 calc() 結合 % 與 px 進行精準向左偏移
            mapWrapper.style.transform = `translate(calc(${moveX}% - ${offsetPx}px), ${moveY}%) scale(3) rotateX(50deg)`;

            // 光點轉向，永遠正對鏡頭
            pins.forEach(p => {
              p.style.transform = `translate(-50%, -50%) translateZ(5px) rotateX(-50deg)`;
            });
        }

        // ==========================================
        // 3. 讀取地點資料，並滑出右側面板 (PC 與手機版共通)
        // ==========================================
        panelTitle.textContent = this.getAttribute('data-title');
        panelDate.textContent = this.getAttribute('data-date');
        panelDesc.textContent = this.getAttribute('data-desc');
        panelImg.style.backgroundImage = `url('${this.getAttribute('data-img')}')`;
        
        sidePanel.classList.add('active'); // 呼叫面板滑入
      });
    });

    // 關閉面版的共用函式
    function closePanelAndResetMap() {
      // 收起右側面板
      sidePanel.classList.remove('active');
      
      // 退回平視角地圖（補上了 scale(1) 確保大小正確還原）
      mapWrapper.style.transform = 'translate(0%, 0%) scale(1) rotateX(0deg)';
      
      pins.forEach(p => {
        p.classList.remove('active', 'dimmed');
        // 拿掉多餘的括號，並確保光點也一起還原角度
        p.style.transform = 'translate(-50%, -50%) translateZ(5px) rotateX(0deg)';
      });
    }

    // 點擊背景空白處，關閉面板並退回
    mapContainer.addEventListener('click', closePanelAndResetMap);
    
    // 點擊面板上的 ✖ 按鈕，關閉面板並退回
    panelClose.addEventListener('click', closePanelAndResetMap);

  </script>

  <script>
  // ==========================================
  //  底部流動煙
  // ==========================================
    const fogCanvas = document.getElementById('fogCanvas');
    const fCtx = fogCanvas.getContext('2d');

    function resizeFog() {
      fogCanvas.width = window.innerWidth;
      fogCanvas.height = window.innerHeight * 0.45; 
    }
    window.addEventListener('resize', resizeFog);
    resizeFog();

    // 1. 載入煙霧圖片
    const smokeImage = new Image();
    smokeImage.crossOrigin = "Anonymous";
    // 這是一張國外開發者常用的高品質煙霧去背 PNG
    smokeImage.src = './img/Smoke-Element.png';

    // 等待真實材質載入完成後，才開始啟動引擎
    smokeImage.onload = () => {
      
      // 離屏渲染染色 (白煙染色)
      const tintedCanvas = document.createElement('canvas');
      tintedCanvas.width = smokeImage.width;
      tintedCanvas.height = smokeImage.height;
      const tCtx = tintedCanvas.getContext('2d');
      tCtx.drawImage(smokeImage, 0, 0);
      tCtx.globalCompositeOperation = 'source-in'; // 只在有煙霧的地方填色
      tCtx.fillStyle = '#465b6a'; // 改煙霧的顏色
      tCtx.fillRect(0, 0, tintedCanvas.width, tintedCanvas.height);

      // 2. 建立雲層陣列 (純左右交錯版)
      const clouds = [];
      const cloudCount = 45; 

      for (let i = 0; i < cloudCount; i++) {
        const layer = i % 3; 
        let size, alpha;
        
        if (layer === 0) { 
          size = Math.random() * 600 + 600; 
          alpha = 0.08; 
        } else if (layer === 1) { 
          size = Math.random() * 400 + 300; 
          alpha = 0.10; 
        } else { 
          size = Math.random() * 250 + 250; 
          alpha = 0.12; 
        }

        const initialY = fogCanvas.height - (size * 0.4) + (Math.random() * 100 - 50);

        clouds.push({
          x: Math.random() * fogCanvas.width,
          y: initialY, 
          // 水平速度，隨機向左或向右
          vx: (Math.random() - 0.5) * 0.5, 
          size: size,
          alpha: alpha,
          rotation: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.0015
        });
      }

      // 3. 雲層流動動畫迴圈
      function animateFog() {
        fCtx.clearRect(0, 0, fogCanvas.width, fogCanvas.height);
        
        fCtx.globalCompositeOperation = 'screen';

        for (let p of clouds) {
          // 只更新 X 軸位置
          p.x += p.vx;
          p.rotation += p.rotSpeed; 

          // X 軸雙向無縫接軌
          if (p.x > fogCanvas.width + p.size) {
            p.x = -p.size;
          } else if (p.x < -p.size) {
            p.x = fogCanvas.width + p.size;
          }

          // 繪製這朵雲
          fCtx.save();
          fCtx.translate(p.x, p.y);
          fCtx.rotate(p.rotation);
          fCtx.globalAlpha = p.alpha;
          fCtx.drawImage(tintedCanvas, -p.size / 2, -p.size / 2, p.size, p.size);
          fCtx.restore();
        }
        
        requestAnimationFrame(animateFog);
      }
      
      // 啟動引擎
      animateFog();
    };
  </script>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1導航地圖</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="F1list2026.js"></script>

<style>
  :root {
    --race-card-height: 60px;
  }

  a {margin: 0;text-decoration:none;color: #fff;}
  
  body {
    margin: 0; 
    background-color: #0d0d17; 
    font-family: 'Rajdhani', sans-serif; 
    overflow: hidden;
    background-image: url(/img/bg01.png);
    background-position: top left;
    background-size: cover;
  }

  .top-nav { display: flex; justify-content: center; gap: 40px; padding: 20px 0; font-size: 1.2rem; font-weight: 600; letter-spacing: 2px; z-index: 10; position: relative; }
  .nav-item { color: #445363; cursor: pointer; transition: 0.3s; }
  .nav-item:hover, .nav-item.active { color: #00d2ff; text-shadow: 0 0 8px #00d2ff; }

  .telemetry { position: absolute; font-size: 0.75rem; color: #4a6b8c; line-height: 1.5; z-index: 5; pointer-events: none; }
  .telemetry span { color: #00d2ff; }
  .top-right { top: 20px; right: 20px; text-align: right; }

  /* ==========================================
     3D 空間與圖層設定
  ========================================== */
  .map-container {
    width: 100vw; height: calc(100vh - 65px);
    display: flex; justify-content: center; align-items: center;
    position: relative;
    perspective: 1200px; /* 攝影機透視深度 */
    overflow: hidden
  }

  .map-wrapper {
    position: relative; 
    width: 90%; max-width: 1140px; aspect-ratio: 16 / 9;
    transform-style: preserve-3d;
    transition: transform 1s cubic-bezier(0.25, 1, 0.5, 1);
  }

  /* 粒子層： Z = 5px，創造「螢幕內部」的微距景深，偏移量極小 */
  #particleCanvas {
    width: 100%; height: 100%; display: block;
    position: absolute; top: 0; left: 0;
    transform: translateZ(-5px);
    pointer-events:none;
  }

  #logo-ani{
    display: flex;
    position: fixed;
    top: 20px;
    left: 20px;
    width: 250px;
    height: 25px;
    z-index: 20;
    cursor: pointer;
    transition: 0.3s;
  }

  #logo-ani-poly{
    position: relative;
    height: 25px;
    width: 25px;
    flex-grow: 0;
    z-index: 10;

    & span:nth-child(1){
      display: block;
      position: absolute;
      width: 11px;
      height: 11px;
      left: 0;
      top: 0;
      background-color: #fff;
      transition: 0.66s cubic-bezier(0.07, 0.48, 0.52, 1.0);
    }

    & span:nth-child(2){
      display: block;
      position: absolute;
      width: 11px;
      height: 11px;
      right: 0;
      top: 0;
      background-color: #fff;
      transition: 0.66s cubic-bezier(0.07, 0.48, 0.52, 1.0);
    }

    & span:nth-child(3){
      display: block;
      position: absolute;
      width: 11px;
      height: 11px;
      right: 0;
      bottom: 0;
      background-color: #fff;
      transition: 0.66s cubic-bezier(0.07, 0.48, 0.52, 1.0);
    }

    & span:nth-child(4){
      display: block;
      position: absolute;
      width: 11px;
      height: 11px;
      left: 0;
      bottom: 0;
      background-color: #fff;
      transition: 0.66s cubic-bezier(0.07, 0.48, 0.52, 1.0);
    }

  }

  #logo-ani-name{
    height: 100%;
    position: relative;
    line-height: 1rem;
    color: #fff;
    flex-grow: 1;
    overflow: clip;
    margin-left: 0.5rem;
    z-index: 20;

    & h3:nth-child(1){
      position: absolute;
      top: 50%;
      transform: translateY(-45%);
      margin: 0;
      transition: 0.66s cubic-bezier(0.07, 0.48, 0.52, 1.04);
      font-size: 2rem;
      filter: drop-shadow(0px 2px 4px #000);
    }
    & h3:nth-child(2){
      position: absolute;
      top: 150%;
      left: 5%;
      transform: translateY(-40%);
      margin: 0;
      transition: 0.66s cubic-bezier(0.07, 0.48, 0.52, 1.04);
      font-size: 1.5rem;
      font-weight: 700;
      opacity: 0;
    }
  }

  /*LOGO動畫*/
  #logo-ani:hover  {

    & #logo-ani-name h3:nth-child(1) { top: -150%; }
    & #logo-ani-name h3:nth-child(2) { top: 50%; opacity: 1;}

    & #logo-ani-poly span{
      /*border-radius: 2rem;*/
      
    }

    & #logo-ani-poly span:nth-child(1){
      top: 0;
      left: 100%;
      width: 200px;
      height: 120%;
      background-color: #f09000;
    }

    & #logo-ani-poly span:nth-child(2){
      top: -20%;
      right: 5px;
      height: 10px;
      width: 10px;
      background-color: #fff;
    }

    & #logo-ani-poly span:nth-child(3){
      bottom: -5px;
      right: -5px;
      height: 10px;
      width: 10px;
      background-color: #fff;
    }

    & #logo-ani-poly span:nth-child(4){
      bottom: 0;
      left: 100%;
      width: 200px;
      height: 120%;
      background-color: #f09000;
    }
  }

  

  /* MAP線條層 */
  #baseMapCanvas {
    width: 100%; height: 100%; display: block;
    position: absolute; top: 0; left: 0;
    transform: translateZ(0);
    opacity: 1; /* 稍微透明一點，增加層次感 */
    pointer-events:none;
  }

  /* ==========================================
     MAP標記點：分層雷達鎖定 (核心正向，外圈貼地)
  ========================================== */
  
  /* 1. 容器本身：不翻轉，負責定位並貼齊地圖平面 */
  .race-pin {
    position: absolute; 
    width: 16px; 
    height: 16px;
    transform: translate(-50%, -50%); 
    cursor: pointer; 
    z-index: 20; 
    transform-style: preserve-3d;
  }

  .race-pin.active{
    z-index: 21;
  }

  /* 2. 外圍虛線雷達圈 */
  .pin-radar {
    position: absolute;
    top: -8px; left: -8px; right: -8px; bottom: -8px;
    border: 1px dashed #00d2ff; 
    border-radius: 50%;
    animation: radarScan 6s linear infinite;
    pointer-events: none;
  }

  /* 3. 正向層：實心藍框*/
  .pin-core {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: 2px solid #00d2ff; 
    border-radius: 50%;
    box-sizing: border-box;
    transform: rotateX(0deg); /* 預設為平視 */
    box-shadow: 0 0 10px rgba(0, 210, 255, 0.6), inset 0 0 8px rgba(0, 210, 255, 0.4);
    transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), border-color 0.3s, box-shadow 0.3s;
  }

  /* 核心中心白點 */
  .pin-core::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 3px; height: 3px;
    background-color: #fff;
    border-radius: 50%;
    box-shadow: 0 0 8px #fff;
  }

  .race-pin:hover .pin-core {
    border-color: #ffe508;
    box-shadow: 0 0 15px rgba(255, 229, 8, 0.8), inset 0 0 10px rgba(255, 229, 8, 0.6);
  }
  .race-pin:hover .pin-radar {
    border-color: #ffe508;
    animation-duration: 4s; /* 點擊後掃描加快 */
  }

  /* 點擊後的 Active 狀態：變成醒目的黃色 */
  .race-pin.active .pin-core {
    border-color: #ffe508;
    box-shadow: 0 0 15px rgba(255, 229, 8, 0.8), inset 0 0 10px rgba(255, 229, 8, 0.6);
  }
  .race-pin.active .pin-radar {
    border-color: #ffe508;
    animation-duration: 4s; /* 點擊後掃描加快 */
  }

  /* 專屬雷達掃描動畫 */
  @keyframes radarScan {
    0% { transform: rotateZ(0deg) scale(0.7); opacity: 0.8; }
    50% { transform: rotateZ(180deg) scale(0.7); opacity: 0.3; }
    100% { transform: rotateZ(360deg) scale(0.7); opacity: 0.8; }
  }

  /*MAP游標懸浮標籤*/
  .pin-label {
    position: absolute; 
    bottom: 20px; 
    left: 50%; 
    transform: translate(-50%, 0px) rotateX(0deg);
    transform-origin: bottom center; 
    
    background: rgba(12, 18, 28, 0.95);
    /* 底層微弱的靜態邊框 */
    box-shadow: inset 0 0 0 1px rgb(178 253 255 / 30%);
    color: #fff; font-size: 0.85rem; font-weight: 700; letter-spacing: 1px;
    padding: 6px 18px; white-space: nowrap;
    opacity: 0; 
    pointer-events: none; 
    z-index: 1;

    transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
  }

  .pin-label::before,.pin-label::after {
    content: ''; 
    position: absolute;
    /* inset: 讓動態線條稍微擴張，包在原本的按鈕外圍 */
    inset: 0px;
    z-index: -1;
    
    /* 設定動態線條的顏色與粗細 (2px) */
    box-shadow: inset 0 0 0 1px #00ffff;
    animation: clipBorder 4s linear infinite;
  }

  /* 讓第二條線延遲一半的動畫時間，形成對角對稱追逐 */
  .pin-label::before {
    animation-delay: -2s;
  }



  @keyframes clipBorder {
    0%, 100% { clip-path: inset(0 0 calc(100% - 2px) 0); } /* 上邊線 */
    25%      { clip-path: inset(0 calc(100% - 2px) 0 0); } /* 左邊線 */
    50%      { clip-path: inset(calc(100% - 2px) 0 0 0); } /* 下邊線 */
    75%      { clip-path: inset(0 0 0 calc(100% - 2px)); } /* 右邊線 */
  }
  
  .race-pin:hover .pin-label {
    opacity: 1; 
    bottom: 28px; 
    text-shadow: 0 0 5px #00ffff;
  }

  .race-pin.active .pin-label {
    opacity: 1; 
    bottom: 28px; 
    background: rgba(0, 0, 0, 0.90);
  }

  @keyframes pulse {
    0% { width: 13px; height: 13px; opacity: 1; }
    100% { width: 49px; height: 49px; opacity: 0; }
  }

  .race-pin.active .tooltip { opacity: 1; bottom: 35px; pointer-events: auto; }
  .race-pin.dimmed { opacity: 0.3; }

  /* ==========================================
     粒子煙霧畫布
    ========================================== */
  #fogCanvas {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; 
    height: 40vh; /* 佔據螢幕底部 40% 的空間 */
    pointer-events: none; /* 絕對不能擋住滑鼠點擊 */
    z-index: -5;
    
    /* 遮罩：讓畫布頂部的邊緣自然淡出 */
    -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 20%, rgba(0,0,0,0) 100%);
    mask-image: linear-gradient(to top, rgba(0,0,0,1) 20%, rgba(0,0,0,0) 100%);
  }

  /* ==========================================
     面板反轉修正
  ========================================== */
  .tooltip {
    position: absolute; bottom: 25px; left: 50%; 
    /* 保持面板立起迎向鏡頭 */
    transform: translateX(-50%) rotateX(-45deg);
    transform-origin: bottom center;
    width: 280px; background: rgba(12, 18, 28, 0.95);
    border: 1px solid #00d2ff; border-radius: 6px; overflow: hidden;
    opacity: 0; pointer-events: none; transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    box-shadow: 0 15px 35px rgba(0,0,0,0.8); z-index: 30;
  }

  /* ==========================================
     右側滑入資訊面板 (Side Panel)
  ========================================== */
  .side-panel {
    display: flex; 
    flex-direction: column;
    position: fixed; 
    top: 0; 
    right: -450px; /* 預設藏在畫面右側外面 */
    width: 400px; 
    max-width: 100dvw;
    height: 100dvh;
    z-index: 99; 
    transition: right 0.6s cubic-bezier(0.25, 1, 0.5, 1);
  }

  .side-panel::after{
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(5px);
    background-color: rgb(0 0 0 / 75%);
  }

  /* 當面板被加上 active class 時，滑入畫面 */
  .side-panel.active { right: 0; }

  .side-panel-outbox{
    position: absolute;
    z-index: 99;
    min-height: 100vh;
  }

  .panel-close {
    position: absolute;
    display: flex;
    top: 5px;
    right: 5px;
    width: 35px;
    height: 35px;
    color: #ffffff96;
    font-size: 1.25rem;
    cursor: pointer;
    z-index: 10;
    transition: 0.3s;
    background-color: #5b5b5bbf;
    border-radius: 100%;
    border: 1px solid #929292;
    justify-content: center;
    align-items: center;
  }
  .panel-close:hover { color: #ffffff; background-color: #ffffff4f;}

  .panel-img { 
    width: 100%;
    height: 225px;
    background-size: cover; 
    background-position: center; 
  }
  .panel-content { padding: 20px; }
  .panel-title { 
    font-size: 2.2rem; 
    font-weight: 700; 
    color: #fff;
     margin: 0 0 5px 0; 
     text-shadow: 0 0 8px #00d2ff; 
  }
  .panel-date { 
    font-size: 1.1rem; 
    color: #00ffff; 
    font-weight: 600; 
    margin-bottom: 25px; 
    letter-spacing: 1px; 
  }
  .panel-desc { 
    font-size: 1rem;
    font-weight: normal;
    color: #a0b0c0;
    line-height: 1.6;
    margin-bottom: 30px;
    letter-spacing: 0.2px;
  }
  
  .panel-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    width: 100%; 
    padding: 15px;  
    border: 1px solid #4d4d4d80;
    color: #697887cf; 
    font-family: 'Rajdhani', sans-serif; 
    font-size: 1.3rem; 
    font-weight: 600;
    cursor: pointer; 
    transition: 0.3s; 
    letter-spacing: 1px;
    border-radius: 3px;
    background-color: transparent;
  }

  .panel-btn:hover {     
    background-color: rgb(93 130 149 / 20%);
    color: #fff;
    letter-spacing: 5px;
  }

  .panel-btn:after {
    content: "";
    position: absolute;
    left: .75rem;
    width: 1rem;
    height: 55%;
    background-color: #00ffff;
    -webkit-clip-path: polygon(0 0, 25% 0, 25% 100%, 0 100%);
    clip-path: polygon(0 0, 25% 0, 25% 100%, 0 100%);
    transition: transform .2s ease, -webkit-clip-path .2s ease;
    transition: clip-path .2s ease, transform .2s ease;
    transition: clip-path .2s ease, transform .2s ease, -webkit-clip-path .2s ease;
  }

  .panel-btn:hover:after {  
    -webkit-clip-path: polygon(0 20%, 100% 50%, 0 80%, 0 80%);
    clip-path: polygon(0 20%, 100% 50%, 0 80%, 0 80%);
    transform: translateX(.575rem);
  }


  .tooltip-img { 
    width: 100%; 
    height: 120px; 
    background-size: cover; 
    background-position: center; 
    border-bottom: 1px solid #1f2d40; 
  }
  .tooltip-content { padding: 15px; text-align: left; }
  .tooltip-title { font-size: 1.4rem; font-weight: 700; color: #fff; margin: 0 0 5px 0; text-shadow: 0 0 5px #00d2ff;}
  .tooltip-date { font-size: 0.95rem; color: #00ffff; font-weight: 600; margin-bottom: 10px; }
  .tooltip-desc { font-size: 0.9rem; color: #a0b0c0; line-height: 1.5; margin: 0; }

  /* ==========================================
     底部滑動抽屜與卡片清單
     ========================================== */
  .bottom-drawer {
    position: fixed;
    bottom: 0;
    left: 50%;
    /* 預設往下藏起來，只露出上面的按鈕高度 */
    transform: translateX(-50%) translateY(calc(100% - 40px)); 
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 50;
    /* 順暢的滑出動畫 */
    transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    padding-bottom: 20px;
  }

  /* 當抽屜打開時的狀態 */
  .bottom-drawer.open {
    transform: translateX(-50%) translateY(0);
  }

  /* 開關按鈕設計 (科技感 HUD 風格) */
  .drawer-toggle-btn {
    background: rgba(10, 15, 30, 0.85);
    border: 1px solid rgba(0, 210, 255, 0.5);
    border-bottom: none;
    border-radius: 10px 10px 0 0;
    color: #00d2ff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 8px 30px;
    cursor: pointer;
    backdrop-filter: blur(5px);
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.3s;
    height: 40px; /* 對應上面隱藏的 40px */
  }
  .drawer-toggle-btn:hover {
    background: rgba(0, 210, 255, 0.2);
    box-shadow: 0 -5px 15px rgba(0, 210, 255, 0.3);
  }
  .drawer-icon {
    font-size: 0.8rem;
    transition: transform 0.3s;
  }
  /* 打開時，箭頭翻轉向下 */
  .bottom-drawer.open .drawer-icon {
    transform: rotate(180deg);
  }

  /* ==========================================
     底部賽事橫向滑動清單
     ========================================== */
  .bottom-expand-menu {
    --visible-count: 4;
    --race-card-gap: 8px;
    position: fixed;
    bottom: 5px;
    left: 20px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 50;
  }

  /* 開關按鈕：寬度固定，避免 open 時影響 expand-race-list 可視寬 */
  .expand-toggle-btn {
    flex: 0 0 auto;
    width: auto;
    background: rgba(10, 15, 30, 0.85);
    border: 1px solid rgba(0, 210, 255, 1);
    color: #00d2ff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 0 14px;
    cursor: pointer;
    backdrop-filter: blur(5px);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    height: var(--race-card-height);
    box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
    white-space: nowrap;
    z-index: 2;
    overflow: hidden;
    transition: background-color 0.3s, box-shadow 0.3s, color 0.3s;
  }

  .expand-toggle-btn:hover {
    background: linear-gradient(to top, rgba(0, 217, 255, 0.3), transparent);
    box-shadow: 0 0 6px rgba(0, 210, 255, 0.5);
  }
  
  /* 開關箭頭動畫 */
  .btn-icon {
    flex: 0 0 auto;
    transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
  }

  /* 打開時箭頭 */
  .bottom-expand-menu.open .btn-icon {
    transform: scaleY(-1); 
    color: #00e6ff;
  }

  .btn-text {
    transition: opacity 0.2s ease, transform 0.2s ease;
  }

  .bottom-expand-menu.open .btn-text {
    opacity: 0;
    transform: scale(0.92);
    pointer-events: none;
    display: none;
  }

  /* 核心動畫：卡片清單容器 (預設隱藏並縮短寬度) */
  .expand-race-list {
    flex: 1 1 0;
    width: 0;
    min-width: 0;
    visibility: hidden;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-behavior: auto;
    scrollbar-width: none;
    cursor: grab;
    user-select: none;
    overflow-anchor: none;
  }

  /*打開狀態*/
  .bottom-expand-menu.open .expand-race-list {
    width: auto;
    visibility: visible;
  }

  .expand-race-list.is-dragging { cursor: grabbing; }

  .expand-race-list::-webkit-scrollbar { display: none; }

  /* ==========================================
     🌟 底部容器 (防閃爍 + 滑鼠拖曳完整版)
     ========================================== */
  .bottom-race-list {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 95%;          
    max-width: 1200px;   
    display: flex;
    gap: 15px;           
    overflow-x: auto;
    padding: 10px;
    z-index: 50;
    scroll-behavior: smooth;
    -ms-overflow-style: none;  
    scrollbar-width: none;  
    cursor: grab; /* 滑鼠游標變成抓取手勢 */
    
    /* 🚀 核心：關閉瀏覽器的自動滾動錨定，防止無限循環時畫面閃爍跳動 */
    overflow-anchor: none; 
  }
  .bottom-race-list:active {
    cursor: grabbing; 
  }
  .bottom-race-list::-webkit-scrollbar {
    display: none; 
  }

  /* 獨立卡片設計 */
  .race-list-track {
    display: flex;
    gap: var(--race-card-gap);
    width: max-content;
    min-width: max-content;
    padding: 10px 0;
    box-sizing: border-box;
    visibility: hidden;
  }

  .expand-race-list.is-ready .race-list-track {
    visibility: visible;
  }

  .race-list-track > .race-card {
    box-sizing: border-box;
    flex: 0 0 auto;
    width: auto;
    min-width: 0;
    max-width: none;
  }
  
  .race-card {
    height: 53px;
    background-color: #000;
    border: 1px solid rgba(0, 210, 255, 0.3);
    overflow: hidden;
    position: relative;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }
  .race-card,  .race-card.simplified, .race-list-track .race-card.loop-card {
    box-sizing: border-box;
  }

  .race-card-bg {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background-size: cover; background-position: center;
    opacity: 0.5; transition: opacity 0.3s; z-index: 1;
  }

  .race-card:hover .race-card-bg, .race-card.active .race-card-bg { opacity: 0.8; }
  .race-card-info {
    position: relative;
    z-index: 2;
    padding: 0;
    background: transparent;
    overflow: hidden;
  }
  .race-card-title {
    color: #fff;
    font-size: 0.95rem; /* 稍微縮小文字 */
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }
  .race-card-date { color: #00d2ff; font-size: 0.8rem; font-weight: 600; }

  .race-card.simplified {
    height: var(--race-card-height);    /* 高度拉出空間顯示賽道 */
    background-color: rgba(10, 15, 30, 0.5);
    border: 1px solid rgb(180 180 180 / 30%);
    display: flex;   
    flex-direction: column; /* 改回垂直排列 */
    justify-content: flex-end; /* 文字貼齊底部 */
    position: relative;
    cursor: pointer;
    transition: all 0.3s ease;
    overflow: hidden;
    backdrop-filter: blur(2px);
  }

  /* 卡片預設狀態：稍微往下、透明、縮小一點 */
  .expand-race-list .race-card {
    opacity: 0;
    will-change: opacity, filter, box-shadow;
  }

  .expand-race-list.is-ready .race-card {
    opacity: 1;
    transition:
      opacity 0.28s ease,
      transform 0.28s ease,
      filter 0.28s ease,
      box-shadow 0.28s ease,
      border-color 0.28s ease,
      background-color 0.28s ease;
  }


  /* 賽道圖背景 */
  .race-card.simplified .race-card-bg {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    /* 使用 contain 確保賽道圖完整顯示不被切掉 */
    background-size: contain; 
    /* 稍微把圖往上提，留空間給下面的文字 */
    background-position: center 20%; 
    background-repeat: no-repeat;
    opacity: 0.3; /* 設定半透明當作浮水印 */
    transition: all 0.3s ease;
    z-index: 1;
  }
  

  .race-card.simplified:hover .race-card-bg, 
  .race-card.simplified.active .race-card-bg {
    opacity: 0.9;
    transform: scale(1.15); /* 賽道圖微放大 */
    filter: drop-shadow(0 0 5px rgba(0, 210, 255, 0.8)); /* 加上藍色霓虹光暈 */
  }

  .race-card.simplified .race-card-info {
    position: relative;
    z-index: 2;
    padding: 8px 5px;
    /* 底部加入黑色漸層，確保白色字體不受背景圖干擾 */
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); 
    text-align: center;
    width: 100%;
    box-sizing: border-box;
  }

  .race-card.simplified .race-card-title {
    color: #fff;
    font-size: 0.95rem;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 0 2px 4px rgba(0,0,0,1);
  }

  

  /* 卡片整體的懸浮與發光效果 */
  .race-card.simplified:hover, .race-card.simplified.active {
    border-color: #00d2ff;
    box-shadow: 0 0 3px rgba(0, 210, 255, 0.6);
  }

  .race-card.simplified:hover .race-card-info, .race-card.simplified.active .race-card-info{
    background: linear-gradient(to top, rgba(0, 217, 255, 0.3), transparent);
  } 
  

  /* 賽道圖容器 (靠左) */
  .race-card-track-container {
    flex: 0 0 60px;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 2;
  }

  /* 賽道圖片 */
  .race-card-track {
    max-width: 100%;
    max-height: 80%;
    object-fit: contain;
    filter: drop-shadow(0 0 5px rgba(0, 210, 255, 0.5)); /* 賽道本身自帶發光 */
    transition: transform 0.3s ease;
  }

  /* 手機版適應 */
@media (max-width: 768px) {
  :root {
    --race-card-height: 96px;
  }

  .bottom-expand-menu {
    left: 0;
    right: 0;
    bottom: 15px;
    padding: 0 10px;
    box-sizing: border-box;
    align-items: center;
    gap: 0;
  }

  .expand-toggle-btn {
    display: none;
  }

  .expand-race-list {
    width: 100%;
    min-width: 0;
    visibility: visible;
    overflow-x: auto;
    overflow-y: visible;
    padding: 18px 0 24px;
    scroll-snap-type: none;
    overscroll-behavior-x: contain;
    touch-action: pan-x;
    cursor: auto;
    -webkit-overflow-scrolling: touch;
  }

  .race-list-track {
    display: flex;
    align-items: center;
    gap: var(--race-card-gap);
    width: max-content;
    min-width: max-content;
    padding: 8px 0;
    box-sizing: border-box;
  }

  .race-list-track > .race-card,
  .race-list-track > .race-card.simplified,
  .race-list-track > .race-card.loop-card {
    flex: 0 0 auto;
    min-width: 0;
    max-width: none;
    box-sizing: border-box;
  }

  .race-card,
  .race-card.simplified {
    height: var(--race-card-height);
    transform-origin: center center;
    transition:
      transform 0.28s ease,
      opacity 0.28s ease,
      filter 0.28s ease,
      box-shadow 0.28s ease,
      border-color 0.28s ease,
      background-color 0.28s ease;
  }

  .race-card.simplified {
    border: 1px solid rgba(180, 180, 180, 0.24);
    background-color: rgba(10, 15, 30, 0.58);
    backdrop-filter: blur(3px);
  }

  .race-card .race-card-bg,
  .race-card.simplified .race-card-bg {
    opacity: 0.52;
    background-size: contain;
    background-position: center 20%;
    background-repeat: no-repeat;
    transition:
      opacity 0.28s ease,
      transform 0.28s ease,
      filter 0.28s ease;
  }

  .race-card .race-card-info,
  .race-card.simplified .race-card-info {
    position: relative;
    z-index: 2;
    padding: 10px 8px;
    background: linear-gradient(to top, rgba(0, 0, 0, 0.88), rgba(0, 0, 0, 0));
    text-align: center;
    box-sizing: border-box;
  }

  .race-card .race-card-title,
  .race-card.simplified .race-card-title {
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .race-card-date {
    font-size: 0.72rem;
  }

  /* 預設全部先當側卡 */
  .expand-race-list .race-card {
    transform: scale(0.88);
    opacity: 0.38;
    filter: brightness(0.45) saturate(0.7);
    z-index: 1;
  }

  .expand-race-list .race-card .race-card-info {
    background: linear-gradient(to top, rgba(0, 0, 0, 0.78), rgba(0, 0, 0, 0.08));
  }

  /* 中央 active 卡 */
  .expand-race-list .race-card.active {
    transform: scale(1);
    opacity: 1;
    filter: none;
    z-index: 3;
  }

  .expand-race-list .race-card.active .race-card-bg {
    opacity: 0.9;
    transform: scale(1.04);
    filter: drop-shadow(0 0 10px rgba(0, 210, 255, 0.45));
  }

  .expand-race-list .race-card.active .race-card-info {
    background: linear-gradient(to top, rgba(0, 210, 255, 0.22), rgba(0, 0, 0, 0.15));
  }

  .race-card-track-container {
    flex: 0 0 45px;
  }

  .race-card-track {
    max-width: 100%;
    max-height: 80%;
  }
}
  

</style>
